kind = "web"
previewPath = "/"
title = "Student Path AI"
version = "1.0.0"
id = "artifacts/student-path-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18881

[services.development]
run = "pnpm --filter @workspace/student-path-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/student-path-ai", "run", "build" ]
publicDir = "artifacts/student-path-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18881"
BASE_PATH = "/"
