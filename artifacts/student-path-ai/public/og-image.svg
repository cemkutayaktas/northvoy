  <rect x="894" y="234" width="84" height="22" rx="11" fill="#1d4ed8" fill-opacity="0.4"/>
  <text x="936" y="248" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-weight="600" font-size="11" fill="#93c5fd" text-anchor="middle">Creativity</text>

