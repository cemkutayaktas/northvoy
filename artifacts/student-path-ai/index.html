        <p>NorthVoy is a free academic guidance tool for high school students. Answer 9 questions about your subjects, interests, strengths, and goals — and get matched with the university majors that fit you best.</p>

        <ol>
          <li><strong>Answer 9 Questions</strong> — Tell us about your favorite subjects, interests, strengths, and career preferences.</li>
          <li><strong>Get Matched Instantly</strong> — Our scoring engine ranks your best-fit majors from a list of 20+ academic fields.</li>
          <li><strong>Explore Your Results</strong> — Dive into career paths, universities in 60+ countries, a 12-month action plan, and download a PDF report.</li>
        </ol>

        <p>Computer Science, Business Administration, Medicine, Creative Arts, Environmental Science, Psychology, Law, Engineering, Data Science, Education, Finance, Architecture, Pharmacy, Media Studies, International Relations, Cybersecurity, Game Design, Nursing, Marketing, Linguistics, and more.</p>

        <ul>
          <li>Free and instant results — no registration required</li>
